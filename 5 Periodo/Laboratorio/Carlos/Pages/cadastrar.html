<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="../Style/cadastrar.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top">
        <div class="texto-top">
            <h1 id="titulo-topo">Crie sua conta</h1>
            <p id="descricao-topo">Comece a registrar seus treinos</p>
        </div>

    </div>

    <div class="content">
        <div class="forms">
            <form id="formCadastro" action="/Pages/index.html" method="post">

                <!-- ETAPA 1 -->
                <div class="step active">
                    <div class="input-usuario">
                        <label>Usuário</label>
                        <input type="text">
                    </div>

                    <div class="input-email">
                        <label>Email</label>
                        <input type="email">
                    </div>

                    <div class="input-password">
                        <label>Senha</label>
                        <input type="password">
                    </div>

                    <div class="input-password">
                        <label>Confirmar senha</label>
                        <input type="password">
                    </div>

                    <div class="botoes">
                        <button type="button" class="prev"><img src="../Assets/seta-esquerda.svg" alt="Voltar"></button>
                        <button type="button" class="next"><img src="../Assets/seta-direita.svg" alt="Próximo"></button>
                    </div>
                </div>

                <!-- ETAPA 2 -->

                <div class="step">
                    <div class="input-usuario">
                        <label>Nome</label>
                        <input type="text">
                    </div>

                    <div class="input-usuario">
                        <label>Idade</label>
                        <input type="number">
                    </div>

                    <div class="input-usuario">
                        <label>Peso</label>
                        <input type="number">
                    </div>

                    <div class="input-usuario">
                        <label>Altura</label>
                        <input type="number">
                    </div>

                    <div class="botoes">
                        <button type="button" class="prev"><img src="../Assets/seta-esquerda.svg" alt="Voltar"></button>
                        <button type="button" class="next"><img src="../Assets/seta-direita.svg" alt="Próximo"></button>
                    </div>
                </div>


                <!-- ETAPA 3 -->

                <div class="step">

                    <div class="opcoes">
                        <label class="opcao">
                        <input type="radio" name="nivel">
                        <span>Estou começando agora</span>
                        </label>

                        <label class="opcao">
                        <input type="radio" name="nivel">
                        <span>Treino a pouco tempo </span>
                        </label>

                        <label class="opcao">
                        <input type="radio" name="nivel">
                        <span>Treino há um tempo</span>
                        </label>

                        <label class="opcao">
                        <input type="radio" name="nivel">
                        <span>Treino há bastante tempo </span>
                        </label>

                    </div>

                    <div class="botoes">
                        <button type="button" class="prev"><img src="../Assets/seta-esquerda.svg" alt="Voltar"></button>
                        <button type="button" class="next"><img src="../Assets/seta-direita.svg" alt="Próximo"></button>
                    </div>

                </div>



                <!-- ETAPA 4 -->

                <div class="step">

                    <div class="opcoes">

                        <label class="opcao">
                        <input type="radio" name="frequencia">
                        <span>1 a 2 vezes por semana</span>
                        </label>

                        <label class="opcao">
                        <input type="radio" name="frequencia">
                        <span>3 vezes por semana</span>
                        </label>

                        <label class="opcao">
                        <input type="radio" name="frequencia">
                        <span>4 a 5 vezes por semana</span>
                        </label>

                        <label class="opcao">
                        <input type="radio" name="frequencia">
                        <span>6 ou mais vezes por semana</span>
                        </label>

                    </div>

                    <div class="botoes">
                        <button type="button" class="prev"><img src="../Assets/seta-esquerda.svg" alt="Voltar"></button>
                        <button type="submit">Finalizar</button>
                    </div>

                </div>
        
            </form>
        </div>
    </div>

    <script src="../script/script.js"></script>
    
</body>
</html>
