<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Detalhado - Carlos</title>
    <link rel="stylesheet" href="../Style/global.css">
    <link rel="stylesheet" href="../Style/treino.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="detalhes">
            <a href="home.html" class="botao-voltar">
                <img src="../Assets/seta-esquerda.svg" alt="Voltar">
            </a>

            <h2>Detalhes treino</h2>
        </div>
    </header>

    <main>
        <div class="titulo-treino">
            <h1>Treino A</h1>
            <p>Glúteos + Posterior</p>
        </div>

        <section class="exercicios">
            <ul class="lista-exercicios">

                <li class="card-exercicio">
                    <div class="info-exercicio">
                        <h3>Mesa flexora</h3>
                        <p>4 séries x 12 repetições</p>
                    </div>
                </li>

                <li class="card-exercicio">
                    <div class="info-exercicio">
                        <h3>Stiff com barra</h3>
                        <p>3 séries x 15 repetições</p>
                    </div>
        
                </li>

                <li class="card-exercicio">
                    <div class="info-exercicio">
                        <h3>Cadeira Flexora</h3>
                        <p>4 séries x 10 repetições</p>
                    </div>
                </li>

                <li class="card-exercicio">
                    <div class="info-exercicio">
                        <h3>Stiff com Halteres</h3>
                        <p>3 séries x 12 repetições</p>
                    </div>
                </li>
            </ul>
        </section>

        <button class="botao-iniciar">Iniciar Treino</button>
    </main>
</body>
</html>
